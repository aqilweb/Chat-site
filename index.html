<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aqil Chat Pro</title>

<!-- Premium Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<!-- CSS Link -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="chat">

  <div class="header">💬 Aqil Chat Pro</div>

  <div id="messages" class="messages"></div>

  <div id="replyBox"></div>

  <div class="input-box">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">➤</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCzFQTyj0HG88Rv2EKPk1albET2jb_A6zc",
  authDomain: "axassi-warsi.firebaseapp.com",
  databaseURL: "https://axassi-warsi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "axassi-warsi",
  storageBucket: "axassi-warsi.firebasestorage.app",
  messagingSenderId: "342256023519",
  appId: "1:342256023519:web:f1580d8767e0a98c4a766a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Username system
let username = localStorage.getItem("name");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("name", username);
}

let replyTo = null;

// Send message
function send() {
  let input = document.getElementById("msg");
  let text = input.value.trim();
  if (!text) return;

  db.ref("chat").push({
    name: username,
    text: text,
    reply: replyTo,
    time: new Date().toLocaleTimeString()
  });

  input.value = "";
  replyTo = null;
  document.getElementById("replyBox").style.display = "none";
}

// Receive messages
db.ref("chat").on("child_added", snap => {
  let d = snap.val();

  let div = document.createElement("div");
  div.className = "msg";

  if (d.name === username) div.classList.add("me");
  else div.classList.add("other");

  if (d.reply) {
    let r = document.createElement("div");
    r.className = "reply";
    r.innerText = d.reply;
    div.appendChild(r);
  }

  let n = document.createElement("div");
  n.className = "name";
  n.innerText = d.name;
  div.appendChild(n);

  let t = document.createElement("div");
  t.innerText = d.text;
  div.appendChild(t);

  let time = document.createElement("div");
  time.className = "time";
  time.innerText = d.time;
  div.appendChild(time);

  div.onclick = () => {
    replyTo = d.text;
    let rb = document.getElementById("replyBox");
    rb.style.display = "block";
    rb.innerText = "Replying to: " + d.text;
  };

  document.getElementById("messages").appendChild(div);

  let box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;
});
</script>

</body>
</html>
