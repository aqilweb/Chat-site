<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aqil Chat Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:sans-serif;
background:#0b141a;
color:white;
}

/* HEADER */
.header{
background:#202c33;
padding:10px;
font-size:18px;
}

/* CHAT AREA */
.messages{
height:75vh;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

/* MESSAGE */
.msg{
padding:10px;
margin:5px 0;
border-radius:10px;
max-width:75%;
}

.me{
background:#005c4b;
align-self:flex-end;
}

.other{
background:#202c33;
align-self:flex-start;
}

/* INPUT */
.input{
display:flex;
padding:10px;
background:#202c33;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
}

button{
margin-left:5px;
border:none;
border-radius:50%;
padding:10px;
cursor:pointer;
}

/* AUDIO */
audio{
margin-top:5px;
width:100%;
}
</style>
</head>

<body>

<div class="header">
💬 Aqil Chat Pro
<div id="online"></div>
</div>

<div id="messages" class="messages"></div>

<div class="input">
<input id="msg" placeholder="Type message..." oninput="typingNow()">
<button onclick="send()">➤</button>
<button onclick="startRec()">🎤</button>
<button onclick="stopRec()">⏹️</button>
<button onclick="clearAll()">🧹</button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
// FIREBASE
const firebaseConfig={
apiKey:"AIzaSyCzFQTyj0HG88Rv2EKPk1albET2jb_A6zc",
databaseURL:"https://axassi-warsi-default-rtdb.asia-southeast1.firebasedatabase.app"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// ✅ USERNAME FIX (force new input if null)
let user=localStorage.getItem("user");

if(!user || user=="null"){
user=prompt("Enter your name");
localStorage.setItem("user",user);
}

// SEND
function send(){
let text=msg.value.trim();
if(!text) return;

db.ref("chat").push({
name:user,
text:text,
time:Date.now(),
likes:0
});

msg.value="";
}

// LOAD
db.ref("chat").on("child_added",s=>{
let d=s.val(),id=s.key;

let div=document.createElement("div");
div.className="msg "+(d.name==user?"me":"other");

div.innerHTML=`
<b>${d.name}</b><br>
${d.text||""}
${d.audio?`<audio controls src="${d.audio}"></audio>`:""}
<br><small>${new Date(d.time).toLocaleTimeString()}</small>
<br>
<button onclick="like('${id}')">❤️ ${d.likes||0}</button>
${d.name==user?`<button onclick="delMsg('${id}')">🗑️</button>`:""}
`;

messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;
});

// LIKE
function like(id){
db.ref("chat/"+id+"/likes").transaction(v=>(v||0)+1);
}

// DELETE
function delMsg(id){
if(confirm("Delete?")){
db.ref("chat/"+id).remove();
}
}

// CLEAR
function clearAll(){
if(confirm("Clear all chat?")){
db.ref("chat").remove();
messages.innerHTML="";
}
}

// ONLINE
db.ref("online/"+user).set(true);
db.ref("online/"+user).onDisconnect().remove();

db.ref("online").on("value",s=>{
online.innerText="🟢 "+Object.keys(s.val()||{}).join(", ");
});

// 🎤 VOICE FIX (IMPORTANT)
let mediaRecorder;
let chunks=[];

async function startRec(){
let stream=await navigator.mediaDevices.getUserMedia({audio:true});
mediaRecorder=new MediaRecorder(stream);

mediaRecorder.ondataavailable=e=>{
chunks.push(e.data);
};

mediaRecorder.onstop=()=>{
let blob=new Blob(chunks,{type:"audio/webm"});
let reader=new FileReader();

reader.onload=e=>{
db.ref("chat").push({
name:user,
audio:e.target.result,
time:Date.now()
});
};

reader.readAsDataURL(blob);
chunks=[];
};

mediaRecorder.start();
}

function stopRec(){
if(mediaRecorder){
mediaRecorder.stop();
}
}

// TYPING
function typingNow(){
db.ref("typing/"+user).set(true);
setTimeout(()=>db.ref("typing/"+user).remove(),2000);
}
</script>

</body>
</html>
