<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aqil World Chat</title>

<!-- Responsive -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="chat-app">

  <div class="header">
    💬 Aqil World Chat
  </div>

  <div id="messages" class="messages"></div>

  <div id="replyBox"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">➤</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCzFQTyj0HG88Rv2EKPk1albET2jb_A6zc",
  authDomain: "axassi-warsi.firebaseapp.com",
  databaseURL: "https://axassi-warsi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "axassi-warsi"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// Username
let username = localStorage.getItem("name");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("name", username);
}

let replyTo = null;

// Send message
function send() {
  let input = document.getElementById("msg");
  let text = input.value.trim();
  if (!text) return;

  db.ref("chat").push({
    name: username,
    text: text,
    reply: replyTo,
    time: new Date().toLocaleTimeString()
  });

  input.value = "";
  replyTo = null;
  document.getElementById("replyBox").style.display = "none";
}

// Receive messages
db.ref("chat").on("child_added", snap => {
  let d = snap.val();

  let div = document.createElement("div");
  div.className = "msg " + (d.name === username ? "me" : "other");

  div.innerHTML = `
    ${d.reply ? `<div class="reply">${d.reply}</div>` : ""}
    <div class="name">${d.name}</div>
    <div class="text">${d.text}</div>
    <div class="time">${d.time}</div>
  `;

  div.onclick = () => {
    replyTo = d.text;
    let rb = document.getElementById("replyBox");
    rb.style.display = "block";
    rb.innerText = "Replying: " + d.text;
  };

  document.getElementById("messages").appendChild(div);

  let box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;
});
</script>

</body>
</html>
