<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pro Chat</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
}

.chat {
  max-width:400px;
  margin:auto;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:#1e293b;
}

.header {
  background:#22c55e;
  padding:10px;
  text-align:center;
  font-weight:bold;
}

.messages {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

.msg {
  max-width:70%;
  padding:8px;
  margin:6px 0;
  border-radius:10px;
  position:relative;
}

.me {
  background:#22c55e;
  margin-left:auto;
  color:black;
}

.other {
  background:#334155;
}

.name {
  font-size:11px;
  color:yellow;
}

.time {
  font-size:10px;
  text-align:right;
  opacity:0.7;
}

.reply {
  font-size:11px;
  color:#94a3b8;
}

.input-box {
  display:flex;
}

input {
  flex:1;
  padding:10px;
  border:none;
  outline:none;
}

button {
  background:#22c55e;
  border:none;
  padding:10px;
}
</style>

</head>
<body>

<div class="chat">
  <div class="header">💬 Live Chat</div>

  <div id="messages" class="messages"></div>

  <div class="input-box">
    <input id="msg" placeholder="Type message...">
    <button onclick="send()">Send</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>

// 🔥 Firebase config (tumhara already daala hua)
const firebaseConfig = {
  apiKey: "AIzaSyCzFQTyj0HG88Rv2EKPk1albET2jb_A6zc",
  authDomain: "axassi-warsi.firebaseapp.com",
  databaseURL: "https://axassi-warsi-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "axassi-warsi",
  storageBucket: "axassi-warsi.firebasestorage.app",
  messagingSenderId: "342256023519",
  appId: "1:342256023519:web:f1580d8767e0a98c4a766a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 👤 username system
let username = localStorage.getItem("name");
if (!username) {
  username = prompt("Enter your name:");
  localStorage.setItem("name", username);
}

let replyTo = null;

// 📤 send message
function send() {
  let input = document.getElementById("msg");
  let text = input.value.trim();
  if (!text) return;

  db.ref("chat").push({
    name: username,
    text: text,
    reply: replyTo,
    time: new Date().toLocaleTimeString()
  });

  input.value = "";
  replyTo = null;
}

// 📥 receive message
db.ref("chat").on("child_added", snap => {
  let d = snap.val();

  let div = document.createElement("div");
  div.className = "msg";

  // apna ya dusra
  if (d.name === username) {
    div.classList.add("me");
  } else {
    div.classList.add("other");
  }

  // reply
  if (d.reply) {
    let r = document.createElement("div");
    r.className = "reply";
    r.innerText = "↩ " + d.reply;
    div.appendChild(r);
  }

  // name
  let n = document.createElement("div");
  n.className = "name";
  n.innerText = d.name;
  div.appendChild(n);

  // text
  let t = document.createElement("div");
  t.innerText = d.text;
  div.appendChild(t);

  // time
  let time = document.createElement("div");
  time.className = "time";
  time.innerText = d.time;
  div.appendChild(time);

  // reply click
  div.onclick = () => {
    replyTo = d.text;
    alert("Replying to: " + d.text);
  };

  document.getElementById("messages").appendChild(div);

  // auto scroll
  let box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;
});
</script>

</body>
</html>
