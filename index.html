<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aqil Chat Ultimate</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}

/* 🌌 GLOBAL BACKGROUND */
#bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* LOGIN */
#login{
position:fixed;width:100%;height:100vh;
display:flex;justify-content:center;align-items:center;
z-index:2;
}

/* LOGIN BOX */
.login-box{
position:relative;padding:30px;width:260px;
background:rgba(0,0,0,0.65);
border-radius:20px;text-align:center;color:#fff;
box-shadow:0 0 30px #ff00cc,0 0 80px #ff00cc inset;
backdrop-filter:blur(10px);
}

.login-box input{
width:100%;margin:8px 0;padding:10px;
background:transparent;border:none;border-bottom:1px solid #ff00cc;color:#fff;
}

.login-box button{
width:100%;padding:10px;border:none;border-radius:20px;
background:linear-gradient(45deg,#ff00cc,#ff4dff);
color:white;
}

/* INTRO */
#intro{
display:none;position:fixed;width:100%;height:100vh;
background:black;justify-content:center;align-items:center;
z-index:2;
}

.stamp{
font-size:34px;
border:4px solid #00ffd5;
padding:25px;
color:#00ffd5;
opacity:0;
transform:scale(6) rotate(-10deg);
box-shadow:0 0 30px #00ffd5;
}

/* 💥 HEAVY STAMP */
@keyframes stamp{
0%{transform:scale(6) rotate(-10deg);opacity:0}
40%{transform:scale(0.7) rotate(3deg);opacity:1}
60%{transform:scale(1.2) rotate(-2deg)}
100%{transform:scale(1)}
}

/* shockwave */
.stamp::after{
content:"";
position:absolute;
top:50%;left:50%;
width:10px;height:10px;
border-radius:50%;
background:#00ffd5;
transform:translate(-50%,-50%);
opacity:0;
animation:shock 0.8s ease-out forwards;
}

@keyframes shock{
0%{opacity:1;transform:translate(-50%,-50%) scale(0)}
100%{opacity:0;transform:translate(-50%,-50%) scale(15)}
}

/* CHAT */
#chat{
display:none;
height:100vh;
flex-direction:column;
background:transparent;
position:relative;
z-index:2;
}

.messages{
flex:1;overflow:auto;padding:10px;
display:flex;flex-direction:column;
backdrop-filter: blur(6px);
position:relative;
z-index:3;
}

/* MESSAGE */
.msg{
max-width:75%;
padding:12px;
margin:6px 0;
border-radius:6px;
word-wrap:break-word;
font-size:14px;
}

/* YOUR MSG */
.me{
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
align-self:flex-end;
box-shadow:0 0 10px rgba(0,198,255,0.5);
}

/* OTHER */
.other{
background:#1a1a1a;
color:#ddd;
align-self:flex-start;
}

/* INPUT */
.input{
display:flex;padding:10px;
background:rgba(0,0,0,0.6);
backdrop-filter: blur(6px);
position:relative;
z-index:3;
}

.input input{
flex:1;padding:10px;border-radius:20px;border:none;
}

button{
margin-left:5px;padding:10px;border:none;border-radius:10px;
cursor:pointer;
}

/* ⚡ LIGHTNING */
.lightning{
position:fixed;
width:3px;height:140px;
background:linear-gradient(#00eaff,#ffffff,#00eaff);
box-shadow:0 0 25px #00eaff;
animation:flash 0.3s linear forwards;
}

@keyframes flash{
0%{opacity:1;transform:scaleY(1)}
100%{opacity:0;transform:scaleY(0.2)}
}
</style>
</head>

<body>

<!-- 🌌 GLOBAL CANVAS -->
<canvas id="bg"></canvas>

<!-- LOGIN -->
<div id="login">
<div class="login-box">
<h2>LOGIN</h2>
<input id="username" placeholder="Username">
<input type="password" placeholder="Password">
<button onclick="start()">SIGN IN</button>
</div>
</div>

<!-- INTRO -->
<div id="intro">
<div class="stamp" id="stamp">CHAT WITH AQIL</div>
</div>

<!-- CHAT -->
<div id="chat">
<div class="messages" id="messages"></div>

<div class="input">
<input id="msgInput" placeholder="Type message">
<button onclick="sendMsg()">➤</button>
<button onclick="clearAll()">🧹</button>
</div>
</div>

<audio id="boom">
<source src="https://www.soundjay.com/button/beep-10.wav">
</audio>

<script>
let username="";
let chats=[];

/* START */
function start(){
let input=document.getElementById("username");
if(!input.value){alert("Enter username!");return;}

username=input.value;

let saved=localStorage.getItem("chat_"+username);
chats=saved?JSON.parse(saved):[];

login.style.display="none";
intro.style.display="flex";

stamp.style.animation="stamp 0.6s forwards";
document.getElementById("boom").play().catch(()=>{});

setTimeout(()=>{
intro.style.display="none";
chat.style.display="flex";
load();
},900);
}

/* SEND */
function sendMsg(){
let input=document.getElementById("msgInput");
if(!input.value.trim()) return;

/* ⚡ lightning */
let bolt=document.createElement("div");
bolt.className="lightning";
bolt.style.left=(window.innerWidth-70)+"px";
bolt.style.top=(window.innerHeight-130)+"px";
document.body.appendChild(bolt);
setTimeout(()=>bolt.remove(),300);

/* SAVE */
chats.push({
user:username,
text:input.value,
time:new Date().toLocaleTimeString(),
likes:0
});

localStorage.setItem("chat_"+username,JSON.stringify(chats));

input.value="";
load();
}

/* LOAD */
function load(){
messages.innerHTML="";
chats.forEach((m,i)=>{
let div=document.createElement("div");
div.className="msg "+(m.user===username?"me":"other");

div.innerHTML=`
<b>${m.user}</b>: ${m.text}
<br><small>${m.time}</small>
<br>
<button onclick="like(${i})">❤️ ${m.likes}</button>
<button onclick="del(${i})">🗑️</button>
`;

messages.appendChild(div);
});
messages.scrollTop=messages.scrollHeight;
}

/* LIKE */
function like(i){
chats[i].likes++;
localStorage.setItem("chat_"+username,JSON.stringify(chats));
load();
}

/* DELETE */
function del(i){
chats.splice(i,1);
localStorage.setItem("chat_"+username,JSON.stringify(chats));
load();
}

/* CLEAR */
function clearAll(){
chats=[];
localStorage.setItem("chat_"+username,JSON.stringify(chats));
load();
}

/* 🌌 ULTIMATE BACKGROUND */
window.onload=function(){
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
let angle=0;

for(let i=0;i<90;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:Math.random()*0.6-0.3,
vy:Math.random()*0.6-0.3,
size:Math.random()*2+1
});
}

function getColor(){
let r=128+Math.sin(Date.now()*0.002)*127;
let b=128+Math.cos(Date.now()*0.002)*127;
return `rgb(${r},0,${b})`;
}

function draw(){
ctx.fillStyle="rgba(15,12,41,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

angle+=0.0005;

ctx.save();
ctx.translate(canvas.width/2,canvas.height/2);
ctx.rotate(angle);
ctx.translate(-canvas.width/2,-canvas.height/2);

particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width) p.vx*=-1;
if(p.y<0||p.y>canvas.height) p.vy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fillStyle=getColor();
ctx.shadowBlur=10;
ctx.shadowColor=getColor();
ctx.fill();

particles.forEach(p2=>{
let dx=p.x-p2.x;
let dy=p.y-p2.y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist<120){
ctx.beginPath();
ctx.moveTo(p.x,p.y);
ctx.lineTo(p2.x,p2.y);
ctx.strokeStyle="rgba(255,255,255,0.08)";
ctx.stroke();
}
});
});

ctx.restore();
requestAnimationFrame(draw);
}

draw();
};
</script>

</body>
</html>
